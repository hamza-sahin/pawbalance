name: Deploy

on:
  push:
    branches: [master]

env:
  NODE_VERSION: '22'
  IMAGE_REPOSITORY: pawbalance-web
  CONTAINER_REGISTRY: registry.optalgo.com
  GITOPS_REPO: hamza-sahin/gitops

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      - uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: out/

  deploy-ota:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: web-build
          path: out/
      - name: Upload bundle to MinIO
        run: |
          BUNDLE_VERSION="1.0.0-${GITHUB_SHA::7}"
          cd out && zip -r ../bundle.zip . && cd ..
          pip install minio -q
          python3 -c "
          from minio import Minio
          client = Minio('minio.optalgo.com', access_key='${{ secrets.MINIO_ACCESS_KEY }}', secret_key='${{ secrets.MINIO_SECRET_KEY }}', secure=True)
          obj_name = 'apps/com.pawbalance.app/versions/${BUNDLE_VERSION}.zip'
          client.fput_object('capgo', obj_name, 'bundle.zip')
          print(f'Uploaded to capgo/{obj_name}')
          "
      - name: Register bundle in Capgo
        run: |
          BUNDLE_VERSION="1.0.0-${GITHUB_SHA::7}"
          npx @capgo/cli bundle upload \
            --channel production \
            --apikey ${{ secrets.CAPGO_APIKEY }} \
            --supa-host ${{ secrets.CAPGO_URL }} \
            --supa-anon ${{ secrets.CAPGO_SUPA_ANON }} \
            --bundle $BUNDLE_VERSION \
            --external https://minio.optalgo.com/capgo/apps/com.pawbalance.app/versions/${BUNDLE_VERSION}.zip \
            --no-key

  deploy-docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.CONTAINER_REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.CONTAINER_REGISTRY }}/${{ env.IMAGE_REPOSITORY }}:latest
            ${{ env.CONTAINER_REGISTRY }}/${{ env.IMAGE_REPOSITORY }}:${{ github.run_number }}
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}

  update-gitops:
    name: Update GitOps Repo
    needs: deploy-docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ env.GITOPS_REPO }}
          token: ${{ secrets.GH_PAT }}
          ref: main
      - name: Update Image Tag
        run: |
          sed -i '/image:/,/tag:/ s/tag: .*/tag: "${{ github.run_number }}"/' helm/pawbalance/values.yaml
      - name: Commit and Push
        run: |
          git config user.email "ci@pawbalance.com"
          git config user.name "PawBalance CI"
          git add helm/pawbalance/values.yaml
          git commit -m "Updated pawbalance-web image tag to ${{ github.run_number }}"
          MAX_RETRIES=5
          RETRY_COUNT=0
          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            if git push origin main; then
              echo "Successfully pushed changes"
              exit 0
            else
              RETRY_COUNT=$((RETRY_COUNT + 1))
              if [ $RETRY_COUNT -lt $MAX_RETRIES ]; then
                echo "Push failed, retrying ($RETRY_COUNT/$MAX_RETRIES)"
                git pull --rebase origin main
              fi
            fi
          done
          echo "Failed to push after $MAX_RETRIES attempts"
          exit 1

  detect-native:
    runs-on: ubuntu-latest
    outputs:
      native_changed: ${{ steps.check.outputs.native_changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - id: check
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -qE '^(ios/|capacitor\.config\.ts|package\.json|package-lock\.json|ExportOptions\.plist|\.github/workflows/deploy\.yml)'; then
            echo "native_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "native_changed=false" >> "$GITHUB_OUTPUT"
          fi

  deploy-testflight:
    runs-on: macos-26
    needs: [build, detect-native]
    if: needs.detect-native.outputs.native_changed == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.2'
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: web-build
          path: out/
      - name: Add and Sync iOS
        run: |
          npx cap add ios
          npx cap sync ios
      - name: Add privacy usage descriptions and URL scheme
        run: |
          /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryUsageDescription string 'PawBalance needs access to your photo library to set your pet profile photo.'" ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Add :NSCameraUsageDescription string 'PawBalance needs access to your camera to take a photo of your pet.'" ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes array" ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:0 dict" ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:0:CFBundleURLName string 'com.pawbalance.app'" ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:0:CFBundleURLSchemes array" ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:0:CFBundleURLSchemes:0 string 'com.pawbalance.app'" ios/App/App/Info.plist
      - name: Import signing credentials
        env:
          CERTIFICATE_P12: ${{ secrets.CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
          PROVISIONING_PROFILE: ${{ secrets.PROVISIONING_PROFILE }}
          APP_STORE_CONNECT_P8: ${{ secrets.APP_STORE_CONNECT_P8 }}
        run: |
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          echo "$CERTIFICATE_P12" | base64 --decode > certificate.p12
          security import certificate.p12 -k build.keychain -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" build.keychain
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROVISIONING_PROFILE" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision
          mkdir -p ~/.private_keys
          echo "$APP_STORE_CONNECT_P8" | base64 --decode > ~/.private_keys/AuthKey_4NH42JUWM6.p8
      - name: Configure signing
        run: |
          cd ios/App
          python3 -c "
          with open('App.xcodeproj/project.pbxproj', 'r') as f:
              content = f.read()
          content = content.replace(
              'CODE_SIGN_STYLE = Automatic;',
              'CODE_SIGN_STYLE = Automatic;\n\t\t\t\tDEVELOPMENT_TEAM = 7N6TBDYHYS;'
          )
          with open('App.xcodeproj/project.pbxproj', 'w') as f:
              f.write(content)
          "
      - name: Archive
        run: |
          cd ios/App
          xcodebuild -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -archivePath build/App.xcarchive \
            -destination 'generic/platform=iOS' \
            DEVELOPMENT_TEAM=7N6TBDYHYS \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/.private_keys/AuthKey_4NH42JUWM6.p8 \
            -authenticationKeyID 4NH42JUWM6 \
            -authenticationKeyIssuerID 0b5bf398-ce6b-47b4-988a-386910acf728 \
            archive
      - name: Export IPA
        run: |
          cd ios/App
          xcodebuild -exportArchive \
            -archivePath build/App.xcarchive \
            -exportPath build/ \
            -exportOptionsPlist ../../ExportOptions.plist \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/.private_keys/AuthKey_4NH42JUWM6.p8 \
            -authenticationKeyID 4NH42JUWM6 \
            -authenticationKeyIssuerID 0b5bf398-ce6b-47b4-988a-386910acf728
      - name: Upload to TestFlight
        env:
          APP_STORE_CONNECT_KEY_ID: "4NH42JUWM6"
          APP_STORE_CONNECT_ISSUER_ID: "0b5bf398-ce6b-47b4-988a-386910acf728"
          APP_STORE_CONNECT_P8: ${{ secrets.APP_STORE_CONNECT_P8 }}
        run: |
          mkdir -p ~/.private_keys
          echo "$APP_STORE_CONNECT_P8" | base64 --decode > ~/.private_keys/AuthKey_4NH42JUWM6.p8
          xcrun altool --upload-app \
            --type ios \
            --file ios/App/build/*.ipa \
            --apiKey "$APP_STORE_CONNECT_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID"
