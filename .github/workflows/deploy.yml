name: Build and Deploy

on:
  push:
    branches: [master]

env:
  NODE_VERSION: '22'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: out/

  deploy-ota:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: web-build
          path: out/
      - name: Upload bundle to MinIO
        run: |
          BUNDLE_VERSION="1.0.0-${GITHUB_SHA::7}"
          cd out && zip -r ../bundle.zip . && cd ..
          pip install minio -q
          python3 -c "
          from minio import Minio
          client = Minio('minio.optalgo.com', access_key='${{ secrets.MINIO_ACCESS_KEY }}', secret_key='${{ secrets.MINIO_SECRET_KEY }}', secure=True)
          obj_name = 'apps/com.pawbalance.app/versions/${BUNDLE_VERSION}.zip'
          client.fput_object('capgo', obj_name, 'bundle.zip')
          print(f'Uploaded to capgo/{obj_name}')
          "
      - name: Register bundle in Capgo
        run: |
          BUNDLE_VERSION="1.0.0-${GITHUB_SHA::7}"
          npx @capgo/cli bundle upload \
            --channel production \
            --apikey ${{ secrets.CAPGO_APIKEY }} \
            --supa-host ${{ secrets.CAPGO_URL }} \
            --supa-anon ${{ secrets.CAPGO_SUPA_ANON }} \
            --bundle $BUNDLE_VERSION \
            --external https://minio.optalgo.com/capgo/apps/com.pawbalance.app/versions/${BUNDLE_VERSION}.zip \
            --no-key

  detect-native:
    runs-on: ubuntu-latest
    outputs:
      native_changed: ${{ steps.check.outputs.native_changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - id: check
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -qE '^(ios/|capacitor\.config\.ts|package\.json|package-lock\.json)'; then
            echo "native_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "native_changed=false" >> "$GITHUB_OUTPUT"
          fi

  deploy-testflight:
    runs-on: macos-latest
    needs: [build, detect-native]
    if: needs.detect-native.outputs.native_changed == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: web-build
          path: out/
      - name: Add and Sync iOS
        run: |
          npx cap add ios
          npx cap sync ios
      - name: Import signing certificate
        env:
          CERTIFICATE_P12: ${{ secrets.CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
          PROVISIONING_PROFILE: ${{ secrets.PROVISIONING_PROFILE }}
        run: |
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          echo "$CERTIFICATE_P12" | base64 --decode > certificate.p12
          security import certificate.p12 -k build.keychain -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" build.keychain
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROVISIONING_PROFILE" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision
      - name: Archive
        run: |
          cd ios/App
          xcodebuild -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -archivePath build/App.xcarchive \
            -destination 'generic/platform=iOS' \
            archive
      - name: Export IPA
        run: |
          cd ios/App
          xcodebuild -exportArchive \
            -archivePath build/App.xcarchive \
            -exportPath build/ \
            -exportOptionsPlist ../../ExportOptions.plist
      - name: Upload to TestFlight
        env:
          APP_STORE_CONNECT_KEY_ID: "4NH42JUWM6"
          APP_STORE_CONNECT_ISSUER_ID: "0b5bf398-ce6b-47b4-988a-386910acf728"
          APP_STORE_CONNECT_P8: ${{ secrets.APP_STORE_CONNECT_P8 }}
        run: |
          mkdir -p ~/.private_keys
          echo "$APP_STORE_CONNECT_P8" | base64 --decode > ~/.private_keys/AuthKey_4NH42JUWM6.p8
          xcrun altool --upload-app \
            --type ios \
            --file ios/App/build/*.ipa \
            --apiKey "$APP_STORE_CONNECT_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID"
